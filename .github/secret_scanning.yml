# Exclude the SERVER-FETCHED test fixtures from secret scanning + push protection.
#
# data/server-fetched/ holds third-party event pages recorded by the auto-extractor
# pipeline via ScraperAPI (.claudinite/local_packs/extractor-pipeline/run_daily/create-extractor/3-prepare.sh).
# Such a page can embed the SITE's own tokens — e.g. a Mapbox key in the markup —
# which are never our or a user's secret, so push protection blocking the recorded
# page only wedges the pipeline (this is what happened in #286). paths-ignore
# applies to both secret-scanning alerts and push protection, so listing the folder
# here lets those fixtures commit while everything else stays protected.
#
# NOTE: the sibling data/user-submitted/ is deliberately NOT listed. HTML a user or
# developer hands us (e.g. when the CI datacenter is bot-blocked) could contain a
# REAL secret, so push protection must stay on there. secret_scanning.yml's only
# knob is paths-ignore (path globs — no per-secret or per-source option), so the
# trust boundary is encoded as the path: trusted provenance == this one folder.
paths-ignore:
  - "dev/requirements/extractor/data/server-fetched/**"
