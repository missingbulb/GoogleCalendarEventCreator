name: Portable lesson for Claudinite
description: Propose a durable, reusable lesson to hand off to the shared Claudinite rules.
title: "[lesson] "
labels: ["claudinite-lesson"]
body:
  - type: markdown
    attributes:
      value: |
        This proposes a **portable** lesson for the shared Claudinite rules. An
        Action copies this issue to the Claudinite repo and closes it here; a
        curation routine there dedupes it against the existing rules and routes it
        into a docs PR. Make it self-contained — Claudinite won't have this repo's
        context. See `docs/claude/claudinite-handoff.md`.
  - type: textarea
    id: lesson
    attributes:
      label: The lesson
      description: One terse, durable, reusable rule — a gotcha, practice, or architecture principle.
    validations:
      required: true
  - type: dropdown
    id: doc
    attributes:
      label: Which shared doc owns it?
      options:
        - engineeringPractices.md
        - agenticBestPractices.md
        - git-and-github.md
        - working-discipline.md
        - agent-architecture.md
        - ownerPreferences.md
        - (let the curator decide)
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it's portable
      description: Which unseen projects/situations it helps, and why it isn't project-specific.
    validations:
      required: true
