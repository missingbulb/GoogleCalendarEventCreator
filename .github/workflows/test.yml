name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # Pushes from the "Refresh snapshots" / "Refresh UI snapshot" workflows
    # only touch these paths and carry [skip ci]; this is a redundant extra
    # guard against re-triggering this workflow.
    paths-ignore:
      - "test/integration/snapshots/**"
      - "test/ui/snapshots/popup.png"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate extension manifest.json
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json'))"

      # "For me" tests: deterministic, no network. These gate every change.
      - name: Run offline tests
        run: npm run test:offline

      # "For you" tests: the reviewed assertions, run against the HTML
      # snapshots committed to test/integration/snapshots/ (kept fresh by
      # the daily "Refresh snapshots" workflow — this job does not refresh
      # them).
      - name: Run live tests
        run: npm run test:live

      # Compares a rendering of the popup against test/ui/snapshots/popup.png
      # (browsable on GitHub). Deterministic and dependency-light (satori +
      # resvg, no browser), so it runs alongside the other tests.
      - name: Run UI snapshot test
        run: npm run test:ui
