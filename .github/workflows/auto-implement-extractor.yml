name: Auto-implement extractor

# Triggered when the 'extractor-request' label is added to an issue.
# Triages the request, probes the event URL, and — only when the page is
# actually fetchable — prepares a branch with the page cached AND the extractor
# scaffolded (matches(), supportedDomains, load lists), runs a Claude agent to
# write just extract() + the test case, then commits and opens the PR itself.
# The agent owns only the judgment step; everything deterministic is hard-coded
# here. See docs/claude/auto-extractor.md.
#
# Required repository secrets:
#   ANTHROPIC_API_KEY_AUTO_IMPLEMENT_EXTRACTOR — Claude API key for the agent
#
# The GITHUB_TOKEN is standard and always available.
on:
  issues:
    types: [labeled]

permissions:
  contents: write       # create / push the feature branch
  pull-requests: write  # open the PR
  issues: write         # post progress / failure comment
  actions: write        # dispatch test.yml on the branch

jobs:
  implement:
    if: github.event.label.name == 'extractor-request'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5
        with:
          # Use the token so git pushes from this job (and the agent) are authorised.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Gather the OTHER open requests with this label so the triage can close a
      # duplicate request for a host that's already in flight: an in-review PR
      # keeps its issue OPEN (the PR only `Closes #N` on merge), so an open
      # issue for the same host means the work is already happening. The network
      # call lives here, in the workflow, so the triage script stays offline and
      # unit-testable. gh is preinstalled on the runner; no npm deps needed yet.
      - name: Gather in-flight requests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list \
            --repo "${{ github.repository }}" \
            --label extractor-request \
            --state open \
            --json number,title,body \
            --limit 100 \
            > /tmp/open-requests.json || echo '[]' > /tmp/open-requests.json
          node -e "console.log('Gathered', JSON.parse(require('fs').readFileSync('/tmp/open-requests.json','utf8')).length, 'open request(s).')"

      # Pre-flight triage: close + skip the (expensive) agent run when the
      # request is already settled — the host already has a dedicated source,
      # it's on config.js's fallback allow/denylist, or it duplicates an
      # in-flight request. Also emits the event URL plus the deterministic
      # slug/caseName the probe and Phase-1 steps below use. Needs only Node +
      # the repo (no deps), so it runs before `npm ci`. The issue fields come
      # from the event payload via env, so free-form text isn't shell-interpolated.
      - name: Triage the request
        id: triage
        env:
          ISSUE_BODY:   ${{ github.event.issue.body }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node tools/triage-extractor-request.js

      - name: Close a triaged request (supported / listed / duplicate)
        if: steps.triage.outputs.skipAgent == 'true'
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/triage-message.md
          gh issue close "$ISSUE_NUMBER" --reason "not planned"

      # Pre-flight URL probe. Fetch the event page the same way the recorder will
      # (tools/probe-url.js → data/fetch-page.js: browser headers + retries). If
      # it isn't fetchable — URL missing, non-2xx, unreachable, or behind a
      # login/bot wall — there is no real page to record a case against, so an
      # agent run would only produce synthetic coverage. Stop instead. Runs
      # before `npm ci` (probe-url.js uses only Node built-ins). Every step below
      # is gated on success(), so a failure here skips them all and the run ends
      # with the failure comment.
      - name: Probe the event URL
        id: probe
        if: success() && steps.triage.outputs.skipAgent != 'true'
        env:
          EVENT_URL: ${{ steps.triage.outputs.url }}
        run: |
          if [ -z "$EVENT_URL" ]; then
            echo "No event URL found in the issue — nothing to probe." >&2
            exit 1
          fi
          node tools/probe-url.js "$EVENT_URL"

      - name: Install npm dependencies
        if: success() && steps.triage.outputs.skipAgent != 'true'
        run: npm ci

      - name: Install Claude Code CLI
        if: success() && steps.triage.outputs.skipAgent != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        if: success() && steps.triage.outputs.skipAgent != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Phase 1 — everything deterministic, done in the workflow (not the agent):
      # branch off main, record the page inline (same fetcher the probe used),
      # scaffold the source with its matches() filled, register the host in
      # supportedDomains, and regenerate the load lists. A baseline test:offline
      # must be green before we spend the agent. If the agent later fails, the
      # whole branch is discarded, so these pre-edits cost nothing. (A push made
      # with GITHUB_TOKEN doesn't fire refresh-cache.yml's push trigger, so the
      # page is recorded exactly once.)
      - name: Prepare branch — record page + scaffold extractor
        id: prepare
        if: success() && steps.triage.outputs.skipAgent != 'true'
        env:
          BRANCH:       claude/extractor/${{ steps.triage.outputs.slug }}
          SLUG:         ${{ steps.triage.outputs.slug }}
          CASE_NAME:    ${{ steps.triage.outputs.caseName }}
          HOST:         ${{ steps.triage.outputs.host }}
          EVENT_URL:    ${{ steps.triage.outputs.url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          git checkout -b "$BRANCH"

          printf '%s' "$EVENT_URL" > "data/$CASE_NAME.url"
          : > "data/$CASE_NAME.html"            # empty file = the recorder's "fetch me" signal
          npm run refresh
          test -s "data/$CASE_NAME.html"        # the page must have actually been recorded

          node tools/scaffold-source.js "$EVENT_URL"
          node tools/scaffold-case.js "$CASE_NAME" "$HOST"   # the agent FILLS this; it never creates a file
          node tools/add-supported-domain.js "$HOST"
          npm run index
          npm run test:offline                  # baseline must be green before the agent

          git add -A
          git commit -m "chore: scaffold $SLUG extractor + cache page (Refs #$ISSUE_NUMBER)"
          # One branch per host; a re-label of the same issue re-records onto it,
          # so this run owns the branch and force is intentional.
          git push -u --force origin "$BRANCH"

      # Fetch the issue via API (avoids shell-escaping issues with free-form
      # bodies) and interpolate it, plus the branch/slug/caseName/host/url, into
      # the static prompt template.
      - name: Build agent prompt
        if: success() && steps.triage.outputs.skipAgent != 'true'
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO:         ${{ github.repository }}
          BRANCH:       claude/extractor/${{ steps.triage.outputs.slug }}
          SLUG:         ${{ steps.triage.outputs.slug }}
          CASE_NAME:    ${{ steps.triage.outputs.caseName }}
          HOST:         ${{ steps.triage.outputs.host }}
          EVENT_URL:    ${{ steps.triage.outputs.url }}
        run: |
          python3 - << 'PYEOF'
          import json, os, urllib.request

          repo         = os.environ["REPO"]
          issue_number = os.environ["ISSUE_NUMBER"]
          token        = os.environ["GH_TOKEN"]

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{issue_number}",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(req) as r:
              issue = json.load(r)

          template = open(".github/agent-prompt-extractor.md").read()
          prompt = (template
              .replace("{{ISSUE_NUMBER}}", issue_number)
              .replace("{{ISSUE_TITLE}}",  issue["title"])
              .replace("{{ISSUE_BODY}}",   issue["body"] or "")
              .replace("{{REPO}}",         repo)
              .replace("{{BRANCH}}",       os.environ["BRANCH"])
              .replace("{{SLUG}}",         os.environ["SLUG"])
              .replace("{{CASE_NAME}}",    os.environ["CASE_NAME"])
              .replace("{{HOST}}",         os.environ["HOST"])
              .replace("{{EVENT_URL}}",    os.environ["EVENT_URL"]))

          open("/tmp/agent-prompt.txt", "w").write(prompt)
          print(f"Prompt length: {len(prompt)} chars")
          PYEOF

      - name: Run Claude agent
        if: success() && steps.triage.outputs.skipAgent != 'true'
        timeout-minutes: 75
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_AUTO_IMPLEMENT_EXTRACTOR }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          REPO:              ${{ github.repository }}
        run: |
          claude \
            --dangerously-skip-permissions \
            --model claude-sonnet-4-6 \
            -p "$(cat /tmp/agent-prompt.txt)"

      # Phase 2 — deterministic wrap-up, done in the workflow (not the agent):
      # the agent's done-signal is the integration case it wrote. If it's absent,
      # the agent judged the page unextractable and commented — no PR. Otherwise
      # re-verify (don't trust the agent), commit its extract() + case, open the
      # PR, and dispatch CI so checks attach to it.
      - name: Finalize — verify, commit, open PR
        if: success() && steps.triage.outputs.skipAgent != 'true'
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          BRANCH:       claude/extractor/${{ steps.triage.outputs.slug }}
          SLUG:         ${{ steps.triage.outputs.slug }}
          CASE_NAME:    ${{ steps.triage.outputs.caseName }}
          HOST:         ${{ steps.triage.outputs.host }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO:         ${{ github.repository }}
        run: |
          set -euo pipefail
          SRC="pipeline/sources/$SLUG.js"
          CASE_FILE="test/extractors/custom/$CASE_NAME.json"

          # Blast-radius guard: the agent's whole write surface is two pre-created
          # files (the source + the case). Revert any OTHER tracked edit (e.g. a
          # shared helper) back to the scaffold commit, and delete anything it
          # created, so a misbehaving agent can't reach the PR. (If the extractor
          # truly depended on a reverted helper edit, the re-verify below goes red
          # and no PR opens — exactly what we want.)
          mapfile -t CHANGED < <(git diff --name-only HEAD)
          for f in "${CHANGED[@]}"; do
            if [ "$f" != "$SRC" ] && [ "$f" != "$CASE_FILE" ]; then
              echo "blast-radius guard: reverting unexpected change to $f"
              git checkout HEAD -- "$f"
            fi
          done
          git clean -fd >/dev/null 2>&1 || true

          # The agent's done-signal is a FILLED case. A still-empty `events` means
          # it judged the page unextractable (and commented) — no PR.
          N=$(CASE_FILE="$CASE_FILE" node -e "try{const e=require('./'+process.env.CASE_FILE).expected.events;process.stdout.write(String(Array.isArray(e)?e.length:0))}catch(_){process.stdout.write('0')}")
          if [ "$N" = "0" ]; then
            echo "Integration case still empty — the agent judged the page unextractable and commented. No PR."
            exit 0
          fi

          # Don't trust the agent — re-verify before opening a PR.
          npm run test:live
          npm run test:offline

          git add "$SRC" "$CASE_FILE"
          if ! git diff --cached --quiet; then
            git commit -m "feat: add $SLUG extractor (Refs #$ISSUE_NUMBER)"
            git push origin "$BRANCH"
          fi

          cat > /tmp/pr-body.md <<EOF
          Implements the extractor for \`$HOST\`.

          The workflow scaffolded the branch — the \`matches()\` gate, the \`supportedDomains\` entry, the regenerated load lists, and the real cached event page (\`data/$CASE_NAME.html\`). The agent wrote \`extract()\` and the integration case asserting the real extraction.

          Closes #$ISSUE_NUMBER
          EOF

          if ! gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr create --base main --head "$BRANCH" \
              --title "feat: add $SLUG extractor" --body-file /tmp/pr-body.md
          fi

          # A GITHUB_TOKEN push/PR doesn't start test.yml; dispatch it so checks
          # attach to the branch head and show on the PR. Best-effort: the PR is
          # already open, so a dispatch hiccup mustn't fail the run (which would
          # post a misleading "workflow failed" comment).
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/actions/workflows/test.yml/dispatches" \
            -d "{\"ref\":\"$BRANCH\"}" || echo "warning: test.yml dispatch failed — dispatch it manually"

          PR_URL=$(gh pr view "$BRANCH" --json url -q .url 2>/dev/null || echo "")
          gh issue comment "$ISSUE_NUMBER" --body "✅ Extractor implemented — PR ready for review: $PR_URL  (asserts against the real cached page; review the \`extract()\` logic and field values before merging)."

      # One comment for any failure. If the probe stopped the run, say why
      # (unfetchable page) rather than the generic message — the two have very
      # different fixes.
      - name: Comment on failure
        if: failure()
        env:
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER:  ${{ github.event.issue.number }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PROBE_OUTCOME: ${{ steps.probe.outcome }}
        run: |
          if [ "$PROBE_OUTCOME" = "failure" ]; then
            BODY="🚫 Couldn't auto-implement this extractor: the event URL is missing, or its page couldn't be fetched from CI (non-success HTTP status, unreachable, or behind a login/bot wall). There's no real page to record a test case against, so no agent run was started. See the [run log]($RUN_URL) for the exact status. The site can still be added by hand — see docs/claude/adding-a-source.md."
          else
            BODY="⚠️ The auto-implement workflow failed. [View run]($RUN_URL). Manual implementation may be needed."
          fi
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
