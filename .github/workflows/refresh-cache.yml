name: Refresh cached HTML files

# Records any missing or empty (zero-byte) dev/requirements/extractor/data/<name>.html by fetching its URL
# (from the matching dev/requirements/extractor/data/<name>.url), runs the live tests, and commits the
# result back to the branch it ran on.
#
# It runs automatically when you push a branch (other than main) that adds or
# removes an dev/requirements/extractor/data/ file — a new dev/requirements/extractor/data/<name>.url, or a deleted dev/requirements/extractor/data/<name>.html you
# want re-recorded. So the flow is just "push the branch"; there's no manual step
# and no separate "force" mode. It's also runnable from the Actions tab. (The
# auto-implement-extractor workflow doesn't use it — it records the page inline in
# Phase 1; see dev/tools/new-extractors-creation/phase1-prepare.sh.)
#
# It never runs on main: a commit to main goes through a PR under branch
# protection, and by merge time the cached HTML is already filled on the branch.
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - "dev/requirements/extractor/data/**"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Route fetches through ScraperAPI (a residential-proxy endpoint) so this
    # datacenter runner isn't bot-blocked by event sites. Optional: if the secret
    # is unset, fetch-page.js fetches directly (see its header). Job-level so every
    # fetching step (the refresh below) inherits it.
    env:
      SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fetches any cached HTML file that is missing or empty (zero bytes) through
      # ScraperAPI (SCRAPER_API_KEY, job-level env), which proxies + renders JS
      # itself — so there's no headless-Chrome setup here any more.
      - name: Refresh cached HTML files
        run: npm run refresh

      # Run the live assertions against the fetched pages, so a site that
      # changed its markup turns this run red.
      - name: Run live tests
        run: npm run test:live

      - name: Commit refreshed cached HTML files
        run: |
          if [ -n "$(git status --porcelain dev/requirements/extractor/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add dev/requirements/extractor/data
            git commit -m "chore: refresh cached HTML files [skip ci]"
            git push
          else
            echo "All cached HTML files already present; nothing to commit."
          fi
