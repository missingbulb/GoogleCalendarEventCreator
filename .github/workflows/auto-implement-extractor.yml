name: Auto-implement extractor

# Triggered when the 'extractor-request' label is added to an issue.
# Triages the request, probes the event URL, and — only when the page is
# actually fetchable — prepares a branch with the page cached AND the extractor
# scaffolded (matches(), supportedDomains, load lists), runs a Claude agent to
# write just extract() + the test case, then commits and opens the PR itself.
# The agent owns only the judgment step; everything deterministic is hard-coded
# here. See docs/claude/auto-extractor.md.
#
# Required repository secrets:
#   ANTHROPIC_API_KEY_AUTO_IMPLEMENT_EXTRACTOR — Claude API key for the agent
#
# The GITHUB_TOKEN is standard and always available.
on:
  issues:
    types: [labeled]

permissions:
  contents: write       # create / push the feature branch
  pull-requests: write  # open the PR
  issues: write         # post progress / failure comment
  actions: write        # dispatch test.yml on the branch

jobs:
  implement:
    if: github.event.label.name == 'extractor-request'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5
        with:
          # Use the token so git pushes from this job (and the agent) are authorised.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Gather the OTHER open requests with this label so the triage can close a
      # duplicate request for a host that's already in flight: an in-review PR
      # keeps its issue OPEN (the PR only `Closes #N` on merge), so an open
      # issue for the same host means the work is already happening. The network
      # call lives here, in the workflow, so the triage script stays offline and
      # unit-testable. gh is preinstalled on the runner; no npm deps needed yet.
      - name: Gather in-flight requests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list \
            --repo "${{ github.repository }}" \
            --label extractor-request \
            --state open \
            --json number,title,body \
            --limit 100 \
            > /tmp/open-requests.json || echo '[]' > /tmp/open-requests.json
          node -e "console.log('Gathered', JSON.parse(require('fs').readFileSync('/tmp/open-requests.json','utf8')).length, 'open request(s).')"

      # Pre-flight triage: close + skip the (expensive) agent run when the
      # request is already settled — the host already has a dedicated source,
      # it's on config.js's fallback allow/denylist, or it duplicates an
      # in-flight request. Also emits the event URL plus the deterministic
      # slug/caseName the probe and Phase-1 steps below use. Needs only Node +
      # the repo (no deps), so it runs before `npm ci`. The issue fields come
      # from the event payload via env, so free-form text isn't shell-interpolated.
      - name: Triage the request
        id: triage
        env:
          ISSUE_BODY:   ${{ github.event.issue.body }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node tools/new-extractors-creation/triage-extractor-request.js

      - name: Close a triaged request (supported / listed / duplicate)
        if: steps.triage.outputs.skipAgent == 'true'
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/triage-message.md
          gh issue close "$ISSUE_NUMBER" --reason "not planned"

      # Pre-flight URL probe. Fetch the event page the same way the recorder will
      # (tools/new-extractors-creation/probe-url.js → data/fetch-page.js: browser headers + retries) and
      # judge whether it's usable as a static case — a 2xx that's actually a
      # bot-challenge / interstitial counts as NOT usable (probe-url.js sniffs the
      # body). If it isn't usable — URL missing, non-2xx, unreachable, behind a
      # login/bot wall, or a challenge page — an agent run would only produce
      # synthetic coverage, so we STOP. But stopping here is an EXPECTED outcome,
      # not a failure: this step never fails the job; it records the decision in
      # `proceed` (and a human-readable `reason`), the downstream steps gate on
      # `proceed == 'true'`, and the run ends GREEN via the "page not usable"
      # comment below. Runs before `npm ci` (probe-url.js uses only Node built-ins).
      - name: Probe the event URL
        id: probe
        if: success() && steps.triage.outputs.skipAgent != 'true'
        env:
          EVENT_URL: ${{ steps.triage.outputs.url }}
        run: |
          if [ -z "$EVENT_URL" ]; then
            {
              echo "proceed=false"
              echo "reason=no event URL was found in the issue body"
            } >> "$GITHUB_OUTPUT"
            echo "No event URL found in the issue — nothing to probe."
            exit 0
          fi
          set +e
          REASON="$(node tools/new-extractors-creation/probe-url.js "$EVENT_URL")"
          CODE=$?
          set -e
          echo "$REASON"
          if [ "$CODE" -eq 0 ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            {
              echo "proceed=false"
              echo "reason=$REASON"
            } >> "$GITHUB_OUTPUT"
          fi

      # The probe decided the page can't back a static case (unfetchable, a
      # bot-challenge, or no URL). That's a handled, expected outcome — tell the
      # requester and let the run finish GREEN. (Genuine failures below still go
      # red via "Comment on failure".)
      - name: Comment — page not usable (expected stop)
        if: success() && steps.triage.outputs.skipAgent != 'true' && steps.probe.outputs.proceed != 'true'
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REASON:       ${{ steps.probe.outputs.reason }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "🚫 Couldn't auto-implement this extractor — $REASON. There's no real page to record a test case against, so no agent run was started. The site can still be added by hand — see docs/claude/adding-a-source.md. ([run log]($RUN_URL))"

      - name: Install npm dependencies
        if: success() && steps.triage.outputs.skipAgent != 'true' && steps.probe.outputs.proceed == 'true'
        run: npm ci

      - name: Install Claude Code CLI
        if: success() && steps.triage.outputs.skipAgent != 'true' && steps.probe.outputs.proceed == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        if: success() && steps.triage.outputs.skipAgent != 'true' && steps.probe.outputs.proceed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Phase 1 — everything deterministic, done in the workflow (not the agent):
      # branch off main, record the page inline (same fetcher the probe used),
      # scaffold the source with its matches() filled, register the host in
      # supportedDomains, and regenerate the load lists. A baseline test:offline
      # must be green before we spend the agent. If the agent later fails, the
      # whole branch is discarded, so these pre-edits cost nothing. (A push made
      # with GITHUB_TOKEN doesn't fire refresh-cache.yml's push trigger, so the
      # page is recorded exactly once.)
      - name: Prepare branch — record page + scaffold extractor
        id: prepare
        if: success() && steps.triage.outputs.skipAgent != 'true' && steps.probe.outputs.proceed == 'true'
        env:
          BRANCH:       claude/extractor/${{ steps.triage.outputs.slug }}
          SLUG:         ${{ steps.triage.outputs.slug }}
          CASE_NAME:    ${{ steps.triage.outputs.caseName }}
          HOST:         ${{ steps.triage.outputs.host }}
          EVENT_URL:    ${{ steps.triage.outputs.url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bash tools/new-extractors-creation/phase1-prepare.sh

      # Fetch the issue via API (avoids shell-escaping issues with free-form
      # bodies) and interpolate it, plus the branch/slug/caseName/host/url, into
      # the static prompt template.
      - name: Build agent prompt
        if: success() && steps.triage.outputs.skipAgent != 'true' && steps.probe.outputs.proceed == 'true'
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO:         ${{ github.repository }}
          BRANCH:       claude/extractor/${{ steps.triage.outputs.slug }}
          SLUG:         ${{ steps.triage.outputs.slug }}
          CASE_NAME:    ${{ steps.triage.outputs.caseName }}
          HOST:         ${{ steps.triage.outputs.host }}
          EVENT_URL:    ${{ steps.triage.outputs.url }}
        run: python3 tools/new-extractors-creation/build-prompt.py

      - name: Run Claude agent
        if: success() && steps.triage.outputs.skipAgent != 'true' && steps.probe.outputs.proceed == 'true'
        timeout-minutes: 75
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_AUTO_IMPLEMENT_EXTRACTOR }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          REPO:              ${{ github.repository }}
        run: |
          claude \
            --dangerously-skip-permissions \
            --model claude-haiku-4-5 \
            -p "$(cat /tmp/agent-prompt.txt)"

      # Phase 2 — deterministic wrap-up, done in the workflow (not the agent):
      # enforce the two-file blast radius, then read the agent's done-signal — a
      # FILLED case. A still-empty case means it judged the page unextractable and
      # commented, so no PR. Otherwise re-verify (don't trust the agent), commit
      # its extract() + case, open the PR, and dispatch CI so checks attach to it.
      - name: Finalize — verify, commit, open PR
        if: success() && steps.triage.outputs.skipAgent != 'true' && steps.probe.outputs.proceed == 'true'
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          BRANCH:       claude/extractor/${{ steps.triage.outputs.slug }}
          SLUG:         ${{ steps.triage.outputs.slug }}
          CASE_NAME:    ${{ steps.triage.outputs.caseName }}
          HOST:         ${{ steps.triage.outputs.host }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO:         ${{ github.repository }}
        run: bash tools/new-extractors-creation/phase2-finalize.sh

      # One comment for a GENUINE failure only. An expected stop (unfetchable /
      # challenge page, or the agent judging the page unextractable) no longer
      # fails the job — those are handled green by their own comment steps above /
      # in phase2-finalize.sh. So reaching here means something actually broke
      # (npm ci, scaffolding, the agent crashed, re-verify went red, …).
      - name: Comment on failure
        if: failure()
        env:
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER:  ${{ github.event.issue.number }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "⚠️ The auto-implement workflow failed unexpectedly. [View run]($RUN_URL). Manual implementation may be needed — see docs/claude/adding-a-source.md."
