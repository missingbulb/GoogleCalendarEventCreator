name: "Release: Publish to Chrome Web Store"

# Takes the google-calendar-event-creator.zip from a GitHub Release and uploads
# it to the Chrome Web Store (optionally publishing it to users), via the Web
# Store API using chrome-webstore-upload-cli.
#
# Run it manually from the Actions tab ("Run workflow") once you've created the
# release package and are ready to ship it to users.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CHROME_EXTENSION_ID     the item/app ID from the Web Store dashboard URL
#   CHROME_CLIENT_ID        OAuth client ID  } generated once against the
#   CHROME_CLIENT_SECRET    OAuth client secret } Chrome Web Store API — see the
#   CHROME_REFRESH_TOKEN    OAuth refresh token } README "Automated publishing".
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (blank = latest release)"
        required: false
        type: string
      auto_publish:
        description: "Publish to users after upload (uncheck to leave it as a draft in the dashboard)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # chrome-webstore-upload-cli reads these env vars directly.
      EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Fail early if credentials are missing
        run: |
          missing=
          for v in EXTENSION_ID CLIENT_ID CLIENT_SECRET REFRESH_TOKEN; do
            [ -n "${!v}" ] || missing="$missing $v"
          done
          if [ -n "$missing" ]; then
            echo "Missing required secret(s):$missing" >&2
            echo "Add them under Settings → Secrets and variables → Actions (see README)." >&2
            exit 1
          fi

      - name: Download the release zip
        run: |
          mkdir -p dist
          # An empty tag makes `gh release download` pick the latest release.
          gh release download ${{ inputs.tag }} \
            --repo "${{ github.repository }}" \
            --pattern "google-calendar-event-creator.zip" \
            --dir dist
          ls -l dist

      - name: Show the version being published
        run: |
          echo "Publishing $(unzip -p dist/google-calendar-event-creator.zip manifest.json | grep '"version"')"

      - name: Upload to the Chrome Web Store
        run: |
          flags=
          if [ "${{ inputs.auto_publish }}" = "false" ]; then
            echo "auto_publish is off — uploading as a draft (publish it from the dashboard)."
          else
            flags="--auto-publish"
          fi
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source dist/google-calendar-event-creator.zip \
            $flags

  # Publish the privacy policy to GitHub Pages alongside the store upload, so the
  # listing's Privacy Policy URL —
  #   https://missingbulb.github.io/GoogleCalendarEventCreator/privacy/
  # is always refreshed from the same PRIVACY.md the listing points at. The
  # Jekyll `permalink: /privacy/` pins that public path independent of where
  # PRIVACY.md lives in the repo (move the file → only the `cat` path below
  # changes, never the URL). One-time owner setup: enable Pages with
  # source = "GitHub Actions" (repo Settings → Pages), or deploy-privacy-page fails.
  build-privacy-page:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Assemble the Pages site from PRIVACY.md
        run: |
          set -euo pipefail
          mkdir -p site
          # The policy page: a permalink pins the public path; the body is
          # PRIVACY.md verbatim (single source of truth — no duplicated copy).
          {
            printf -- '---\npermalink: /privacy/\ntitle: "Privacy Policy"\n---\n\n'
            cat dev/build/release/store_artifacts/PRIVACY.md
          } > site/privacy.md
          # Site root redirects to the policy (relative link → no baseurl to hardcode).
          printf '%s\n' \
            '<!doctype html>' \
            '<meta charset="utf-8">' \
            '<meta http-equiv="refresh" content="0; url=privacy/">' \
            '<title>Privacy Policy</title>' \
            '<a href="privacy/">Privacy Policy</a>' > site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

  deploy-privacy-page:
    needs: build-privacy-page
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    # Never run two Pages deploys at once; let an in-flight deploy finish.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
