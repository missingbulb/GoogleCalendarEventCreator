name: Tests

on:
  # Manual runs from the Actions tab / API, on any branch. GitHub only exposes
  # this once the workflow is on the default branch, so it covers future dev
  # branches; for a brand-new branch, the push trigger below runs CI right away.
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    # main, plus agent dev branches, so CI (including the real-Chrome e2e smoke
    # test) runs on a dev branch without opening a PR. A branch that also has an
    # open PR gets a pull_request run too — accepted as minor duplication.
    branches: [main, "claude/**"]
    # Pushes from the "Refresh cached HTML files" / "Refresh UI snapshot"
    # workflows only touch these paths and carry [skip ci]; this is a redundant
    # extra guard against re-triggering this workflow.
    paths-ignore:
      - "data/**"
      - "test/ui/snapshots/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate extension manifest.json
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json'))"

      # "For me" tests: deterministic, no network. These gate every change.
      - name: Run offline tests
        run: npm run test:offline

      # "For you" tests: the reviewed assertions, run against the cached
      # HTML files committed to data/ (kept fresh by the daily "Refresh
      # cached HTML files" workflow — this job does not refresh them).
      - name: Run live tests
        run: npm run test:live

      # Compares a rendering of the popup against test/ui/snapshots/popup-single-event.png
      # (browsable on GitHub). Deterministic and dependency-light (satori +
      # resvg, no browser), so it runs alongside the other tests.
      - name: Run UI snapshot test
        run: npm run test:ui

      # Real-Chrome smoke test: loads the unpacked extension in headless Chrome
      # (preinstalled on ubuntu-latest) and asserts the MV3 service worker
      # registers — the one layer that exercises Chrome's actual extension
      # loader, the layer that broke in #146. Separate from the browserless
      # suites above; it skips automatically if no Chrome is found.
      - name: Run real-Chrome extension-load smoke test
        run: npm run test:e2e
        env:
          CHROME_PATH: /usr/bin/google-chrome
