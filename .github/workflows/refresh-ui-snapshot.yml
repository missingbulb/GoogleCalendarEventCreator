name: Refresh UI snapshot

# Regenerates the popup UI snapshot (test/ui/snapshots/popup.png) on the same
# runner image used by the Tests workflow's ui-test job, so the stored image
# and the comparison are rendered in matching environments. Run manually
# after an intentional change to popup.html/popup.js.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Refresh UI snapshot
        run: npm run refresh:ui

      - name: Commit refreshed snapshot
        run: |
          if [ -n "$(git status --porcelain test/ui/snapshots/popup.png)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add test/ui/snapshots/popup.png
            git commit -m "chore: refresh popup UI snapshot [skip ci]"
            git push
          else
            echo "Snapshot already up to date; nothing to commit."
          fi
