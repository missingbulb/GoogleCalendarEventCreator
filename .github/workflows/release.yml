name: Create Release Package

# Builds and publishes a GitHub Release of the extension at the version that is
# currently committed in manifest.json. It does NOT change the version and takes
# NO inputs — bumping is a deliberate, human step (ask Claude to "bump version";
# it edits manifest.json/package.json on a branch and lands on main via a normal
# PR — see docs/claude/workflow.md). The workflow refuses to run when that
# version already matches the latest published release, so the same version can't
# be shipped twice.
#
# Run it from the Actions tab ("Run workflow"). Pushing to the Chrome Web Store is
# a separate, manual step (the "Publish to Chrome Web Store" workflow).
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The version to release is whatever's committed in manifest.json (the
      # store's source of truth, kept in sync with package.json). Refuse to
      # proceed unless it's a new version — it must differ from the latest
      # published release and have no matching tag yet. A same-version run means
      # nobody bumped the version; fail loudly instead of rebuilding it.
      - name: Resolve and guard version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./manifest.json').version")"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "manifest.json version '$version' is not X.Y.Z." >&2
            exit 1
          fi
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$pkg_version" != "$version" ]; then
            echo "package.json ($pkg_version) and manifest.json ($version) disagree — bump both together." >&2
            exit 1
          fi
          latest="$(gh release view --json tagName -q .tagName 2>/dev/null | sed 's/^v//' || true)"
          if [ -n "$latest" ] && [ "$latest" = "$version" ]; then
            echo "v$version is already the latest release. Bump the version before releasing." >&2
            exit 1
          fi
          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "Tag v$version already exists. Bump the version before releasing." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Releasing v$version" >> "$GITHUB_STEP_SUMMARY"

      # The same gates CI runs on every PR.
      - name: Run offline tests
        run: npm run test:offline
      - name: Run live tests
        run: npm run test:live
      - name: Run UI snapshot test
        run: npm run test:ui

      - name: Build extension zip
        run: npm run build

      # Publish the Release. action-gh-release creates the tag (vX.Y.Z) at this
      # commit when it doesn't exist — that's a tag, not a push to main, so
      # branch protection on main doesn't apply.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/google-calendar-event-creator.zip
          generate_release_notes: true
