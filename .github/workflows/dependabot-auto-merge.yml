# Auto-merge Dependabot's Claudinite submodule-bump PRs once CI is green.
#
# The only thing Dependabot updates in this repo is the Claudinite shared-rules
# pin (docs/claude/shared). That text was already reviewed when it merged in
# Claudinite, so a second per-consumer review is redundant — a green `test` check
# (which validates the shared rules via the submodule checkout, see test.yml /
# #444) is sufficient. So: enable GitHub's native auto-merge on the bump PR and
# let branch protection hold it until the check passes. (#364 / #445)
#
# TWO REPO SETTINGS are required for this to work (the workflow can't set them):
#   1. Settings → General → "Allow auto-merge" — `gh pr merge --auto` errors without it.
#   2. Branch protection on `main` requiring the `test` status check — this is
#      what makes --auto WAIT for green instead of merging immediately.
#
# This is the canonical pattern from GitHub's "Automating Dependabot with GitHub
# Actions" docs. The `pull_request` event from Dependabot runs with a read-only
# token by default; the `permissions:` block below elevates the automatic
# GITHUB_TOKEN (not a custom secret) to what auto-merge needs.
name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only Dependabot's own PRs.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # Scope to the submodule bump specifically, so adding another ecosystem
      # later doesn't silently inherit auto-merge without a deliberate change.
      - name: Enable auto-merge (squash) for the submodule bump
        if: steps.meta.outputs.package-ecosystem == 'gitsubmodule'
        # No --subject: GitHub's squash default is "<PR title> (#N)", which keeps
        # main's linear one-commit-per-PR history (see docs/claude/github.md).
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
