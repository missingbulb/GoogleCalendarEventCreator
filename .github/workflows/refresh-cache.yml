name: Refresh cached HTML files

# Records any missing or empty (zero-byte) dev/requirements/extractor/data/<name>.html by fetching its URL
# (from the matching dev/requirements/extractor/data/<name>.url), runs the live tests, and commits the
# result back to the branch it ran on.
#
# It runs automatically when you push a branch (other than main) that adds or
# removes an dev/requirements/extractor/data/ file — a new dev/requirements/extractor/data/<name>.url, or a deleted dev/requirements/extractor/data/<name>.html you
# want re-recorded. So the flow is just "push the branch"; there's no manual step
# and no separate "force" mode. It's also runnable from the Actions tab. (The
# auto-implement-extractor workflow doesn't use it — it records the page inline in
# Phase 1; see dev/tools/new-extractors-creation/phase1-prepare.sh.)
#
# It never runs on main: a commit to main goes through a PR under branch
# protection, and by merge time the cached HTML is already filled on the branch.
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - "dev/requirements/extractor/data/**"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Provide a Chrome for Testing binary so the recorder can render a
      # data-less JS single-page-app shell into extractable HTML (issue #310;
      # dev/requirements/extractor/page-infra/render-page.js). Same on-demand fetch + monthly cache as the e2e
      # smoke test in test.yml — no project dependency added. Without this the
      # recorder simply keeps the static HTML (the render step no-ops).
      - name: Chrome for Testing cache key
        id: cft-key
        run: echo "key=cft-${{ runner.os }}-$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
      - name: Cache Chrome for Testing
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/cft
          key: ${{ steps.cft-key.outputs.key }}

      # Fetches any cached HTML file that is missing or empty (zero bytes), and
      # renders SPA shells via headless Chrome (render-page.js). RENDER_NO_SANDBOX
      # is set because GitHub's hosted runner can't run Chrome's sandbox here; the
      # ephemeral disposable runner is the isolation boundary (see render-page.js).
      - name: Refresh cached HTML files
        run: |
          CHROME_PATH="$(find "${RUNNER_TEMP}/cft" -type f -name chrome 2>/dev/null | head -n1)"
          if [ -z "$CHROME_PATH" ]; then
            out="$(npx --yes @puppeteer/browsers install chrome@stable --path "${RUNNER_TEMP}/cft")"
            echo "$out"
            CHROME_PATH="$(echo "$out" | tail -n1 | awk '{print $NF}')"
          fi
          export CHROME_PATH RENDER_NO_SANDBOX=1
          echo "Using Chrome at: $CHROME_PATH"
          npm run refresh

      # Run the live assertions against the fetched pages, so a site that
      # changed its markup turns this run red.
      - name: Run live tests
        run: npm run test:live

      - name: Commit refreshed cached HTML files
        run: |
          if [ -n "$(git status --porcelain dev/requirements/extractor/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add dev/requirements/extractor/data
            git commit -m "chore: refresh cached HTML files [skip ci]"
            git push
          else
            echo "All cached HTML files already present; nothing to commit."
          fi
