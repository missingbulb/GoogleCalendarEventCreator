<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <p id="heading">Reading page&hellip;</p>
    <!-- Positioned wrapper so the edge fades overlay the scroller. The fades are
         scroll cues: shown only when there's more list in that direction (toggled
         in popup.js's render). -->
    <div id="events-viewport">
      <div id="events"></div>
      <div class="scroll-fade top"></div>
      <div class="scroll-fade bottom"></div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
