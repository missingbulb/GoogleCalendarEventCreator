name: Refresh UI snapshot

# Regenerates the popup UI snapshot (test/ui/snapshots/popup-single-event.png). Rendering
# is deterministic (satori + resvg, no browser), so this mainly exists for
# convenience after an intentional change to popup.html/popup.js, in case
# refreshing locally isn't convenient.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh UI snapshot
        run: npm run refresh:ui

      - name: Commit refreshed snapshot
        run: |
          if [ -n "$(git status --porcelain test/ui/snapshots/popup-single-event.png)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add test/ui/snapshots/popup-single-event.png
            git commit -m "chore: refresh popup UI snapshot [skip ci]"
            git push
          else
            echo "Snapshot already up to date; nothing to commit."
          fi
