name: "Auto-Implement Extractor: Prepare"
# Distinct per-run title so this phase is discernible in the Actions list (every
# `issues: labeled` event fires all the label-routed workflows; without this each
# run shows only the issue title). Evaluated at run start — there's no way to
# rename a run afterwards.
run-name: "Prepare extractor · #${{ github.event.issue.number }} — ${{ github.event.issue.title }}"

# Triggered when the 'extractor-request' label is added to an issue.
# Triages the request, then prepares a branch with the event page downloaded
# (record_page → ScraperAPI) AND the extractor scaffolded (matches(),
# supportedDomains, load lists). If the page can't be downloaded (or anything else
# breaks before the hand-off), Phase 1 fails and the "Comment on failure and hand
# off to a human" step drops `extractor-request` and adds
# `extractor-blocked-needs-human` — the same human-triage signal the agent and
# finalize stops use. It does NOT run the agent
# any more: the implementation step is a Claude Code on the web routine wired to
# the `extractor-agent-ready` label, so the last thing this workflow does is swap
# `extractor-request` → `extractor-agent-ready` (the hand-off). When the agent
# finishes it adds `extractor-agent-done`, which fires finalize-extractor.yml
# (Phase 2: blast-radius guard, re-verify, PR). Everything deterministic stays in
# the workflows; the agent owns only the judgment step. See
# dev/procedures/this_project/auto-extractor.md.
#
# The GITHUB_TOKEN is standard and always available; no other secret is needed
# (the agent runs in Claude Code on the web, not here).
on:
  issues:
    types: [labeled]

permissions:
  contents: write       # create / push the feature branch
  issues: write         # post progress / failure comment, swap labels

jobs:
  implement:
    # Route Phase 1's page download (record_page in phase1-prepare.sh) through
    # ScraperAPI's residential proxy so this datacenter runner isn't bot-blocked.
    # Optional: with the secret unset, record_page fetches directly. Job-level so
    # the Prepare step inherits it.
    env:
      SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
    if: github.event.label.name == 'extractor-request'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5
        with:
          # Use the token so git pushes from this job (and the agent) are authorised.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Gather the OTHER open requests with this label so the triage can defer a
      # same-host request for a host that's already in flight: an in-review PR
      # keeps its issue OPEN (the PR only `Closes #N` on merge), so an open
      # issue for the same host means the work is already happening. The newer
      # request's URL isn't discarded — it's folded into the leader as a sample
      # (the "Attach the event page to the leader" step below). The network call
      # lives here, in the workflow, so the triage script stays offline and
      # unit-testable. gh is preinstalled on the runner; no npm deps needed yet.
      - name: Gather in-flight requests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list \
            --repo "${{ github.repository }}" \
            --label extractor-request \
            --state open \
            --json number,title,body \
            --limit 100 \
            > /tmp/open-requests.json || echo '[]' > /tmp/open-requests.json
          node -e "console.log('Gathered', JSON.parse(require('fs').readFileSync('/tmp/open-requests.json','utf8')).length, 'open request(s).')"

      # Pre-flight triage: close + skip the (expensive) agent run when the
      # request is already settled — the host already has a dedicated source,
      # it's on extension/config.js's fallback allow/denylist, or another in-flight request
      # already covers its host (its URL is folded into that leader as a sample).
      # Also emits the event URL plus the deterministic
      # slug/caseName the Phase-1 step below uses. Needs only Node +
      # the repo (no deps), so it runs before `npm ci`. The issue fields come
      # from the event payload via env, so free-form text isn't shell-interpolated.
      - name: Triage the request
        id: triage
        env:
          ISSUE_BODY:   ${{ github.event.issue.body }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node dev/tools/new-extractors-creation/triage-extractor-request.js

      # A same-host request in flight isn't discarded: its event page is folded
      # into the LEADER issue as an extra sample, so that extractor can pick up a
      # second real integration case. The network read/write lives here (gh); the
      # body edit itself is the offline, unit-tested attach-sample-url.js. Runs
      # before the close below so the URL is recorded before this issue closes.
      - name: Attach the event page to the leader (sample)
        if: steps.triage.outputs.reason == 'sample'
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          LEADER:     ${{ steps.triage.outputs.leader }}
          SAMPLE_URL: ${{ steps.triage.outputs.url }}
        run: |
          ISSUE_BODY="$(gh issue view "$LEADER" --repo "${{ github.repository }}" --json body -q .body)" \
            node dev/tools/new-extractors-creation/attach-sample-url.js > /tmp/leader-body.md
          gh issue edit "$LEADER" --repo "${{ github.repository }}" --body-file /tmp/leader-body.md
          echo "Attached $SAMPLE_URL to leader #$LEADER as an additional sample."

      - name: Close a triaged request (listed / sample)
        if: steps.triage.outputs.skipAgent == 'true'
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/triage-message.md
          gh issue close "$ISSUE_NUMBER" --reason "not planned"

      # No pre-flight probe any more: ScraperAPI owns getting past proxies, bot
      # walls, and CAPTCHAs, so there's nothing cheap left to judge before the
      # agent. The page is downloaded in Phase 1 (record_page in phase1-prepare.sh,
      # `curl -f` through ScraperAPI). If it can't be downloaded, Phase 1 fails and
      # the "Comment on failure and hand off to a human" step flags the issue. (A page that
      # downloads but isn't one event — a listing/login page — is still the agent's
      # bail in Stage 2.)

      # Supported mode: the host already has a dedicated source. We're NOT closing
      # the request — the pipeline adds a fresh integration case to that existing
      # source. Leave a note on the issue so it's clear this isn't a new-source run
      # and which source it relates to. (Green; informational.)
      - name: Note the already-supported relationship (supported mode)
        if: success() && steps.triage.outputs.mode == 'supported'
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          HOST:         ${{ steps.triage.outputs.host }}
          SOURCE_PATH:  ${{ steps.triage.outputs.sourcePath }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "ℹ️ \`$HOST\` is already supported by \`$SOURCE_PATH\`. Rather than close this, the pipeline will add a fresh integration case from your event page to harden that existing extractor — the agent runs next and a PR will follow."

      - name: Install npm dependencies
        if: success() && steps.triage.outputs.skipAgent != 'true'
        run: npm ci

      - name: Configure git
        if: success() && steps.triage.outputs.skipAgent != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Phase 1 — everything deterministic, done in the workflow (not the agent):
      # branch off main, download the event page (record_page → curl through
      # ScraperAPI, which proxies + renders JS itself, so a JS single-page-app
      # records with real data without a local headless browser), scaffold the
      # source with its matches() filled, register the host in supportedDomains, and
      # regenerate the load lists. A baseline test:offline must be green before
      # handing off. The commit message is `chore: scaffold <slug> extractor …` —
      # the finalize workflow finds the scaffold commit by it.
      - name: Prepare branch — record page + scaffold extractor
        id: prepare
        if: success() && steps.triage.outputs.skipAgent != 'true'
        env:
          MODE:         ${{ steps.triage.outputs.mode }}
          BRANCH:       ${{ steps.triage.outputs.branch }}
          SLUG:         ${{ steps.triage.outputs.slug }}
          CASE_NAME:    ${{ steps.triage.outputs.caseName }}
          HOST:         ${{ steps.triage.outputs.host }}
          EVENT_URL:    ${{ steps.triage.outputs.url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bash dev/tools/new-extractors-creation/phase1-prepare.sh

      # Hand off to the agent: the branch is scaffolded + pushed, so swap the
      # label — remove `extractor-request`, add `extractor-agent-ready`. Adding
      # that label is what triggers the Claude Code on the web routine that writes
      # extract() + the case (it derives the branch/file names from the issue URL
      # itself). The agent then adds `extractor-agent-done`, firing
      # finalize-extractor.yml. See dev/tools/new-extractors-creation/handoff-to-agent.sh.
      - name: Hand off to the implementation agent
        if: success() && steps.triage.outputs.skipAgent != 'true'
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bash dev/tools/new-extractors-creation/handoff-to-agent.sh

      # One comment for a GENUINE failure only. An expected stop (triaged close,
      # agent bail) is handled green elsewhere, so reaching here means something
      # actually broke before the hand-off — most often the page couldn't be
      # downloaded (record_page → 403), or npm ci / scaffolding / git failed.
      # Hand the issue to a human the SAME way the agent (Stage 2) and finalize
      # (Stage 3) stops do: drop the `extractor-request` trigger and flag
      # `extractor-blocked-needs-human`, so the "needs a human" state is consistent
      # across every stop path — the issue no longer sits looking like an
      # unprocessed request, and a re-add of `extractor-request` is what it now
      # takes to retry (against a site that may well just fail to download again).
      # Create the label idempotently first (GitHub won't make it on demand). The
      # remove-label is guarded: if the hand-off already removed `extractor-request`
      # before failing, the combined edit would error, so fall back to add-only.
      - name: Comment on failure and hand off to a human
        if: failure()
        env:
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER:  ${{ github.event.issue.number }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create "extractor-blocked-needs-human" --color B60205 \
            --description "Automation could not proceed; a maintainer needs to take this over by hand" \
            2>/dev/null || true
          gh issue comment "$ISSUE_NUMBER" --body "⚠️ The auto-implement workflow failed before it could hand off to the agent. [View run]($RUN_URL). Flagging \`extractor-blocked-needs-human\` — manual implementation may be needed, see dev/procedures/this_project/adding-a-source.md."
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "extractor-blocked-needs-human" \
            --remove-label "extractor-request" \
            || gh issue edit "$ISSUE_NUMBER" --add-label "extractor-blocked-needs-human"
