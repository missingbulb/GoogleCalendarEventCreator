name: "Release: Create Package"

# Thin stub of the chrome-extension-release standard: the logic lives in the
# Claudinite canon as a reusable workflow (referenced @main, so canon changes
# apply here automatically). This file owns only the triggers and this repo's
# values: the zip, the manifest path, and the three-suite test gate.
#
# Cutting a release is merging a version bump to main (the push trigger below);
# it's also runnable from the Actions tab. What the workflow does — the version
# guard (clean no-op if already released), the full test gate, the build, the
# GitHub Release — is documented in the called workflow.
on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - extension/manifest.json

permissions:
  contents: write
  issues: write

jobs:
  release:
    uses: missingbulb/Claudinite/.github/workflows/chrome-extension-release.yml@main
    with:
      zip_path: dist/google-calendar-event-creator.zip
      manifest_path: extension/manifest.json
      test_command: |
        npm run test:offline
        npm run test:live
        npm run test:ui
