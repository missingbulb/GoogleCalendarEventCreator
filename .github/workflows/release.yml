name: Create Release Package

# Cuts a release of the extension: bumps the version, builds the shippable zip
# (dist/google-calendar-event-creator.zip), and publishes a GitHub Release with
# it attached. Pushing the result to the Chrome Web Store is a separate, manual
# step — run the "Publish to Chrome Web Store" workflow when you're ready.
#
#   * "Run workflow" (workflow_dispatch) — the normal path. Optionally type the
#     version; leave it blank to bump the current minor version (x.Y.z ->
#     x.(Y+1).0). The workflow writes that version into manifest.json /
#     package.json, commits, tags `vX.Y.Z`, and releases.
#
#       (GitHub can't pre-fill the input with a computed value — workflow_dispatch
#       defaults are static — so "blank = next minor" is the convenience instead;
#       the resolved version is printed in the run summary.)
#
#   * Push a tag `vX.Y.Z` by hand — for when you bumped manifest.json yourself.
#     The tag must match manifest.json's version.
#
# Either way the zip is attached to the Release under a stable name, so the
# latest build is always at:
#   https://github.com/missingbulb/GoogleCalendarEventCreator/releases/latest/download/google-calendar-event-creator.zip
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 1.1.0 (blank = bump the current minor version)"
        required: false
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Resolve the version being released:
      #   tag push          -> the tag (minus the leading "v")
      #   dispatch + input  -> the input
      #   dispatch + blank  -> bump the current manifest minor (x.Y.z -> x.(Y+1).0)
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            version="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="$(node -e "const v=require('./manifest.json').version.split('.').map(Number); v[1]++; v[2]=0; console.log(v.join('.'))")"
          fi
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version '$version' (expected X.Y.Z)." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Releasing v$version" >> "$GITHUB_STEP_SUMMARY"

      # Dispatch path: write the resolved version into the manifest (the store's
      # source of truth) and package.json, keeping the two in sync.
      - name: Apply version
        if: github.event_name == 'workflow_dispatch'
        run: |
          version="${{ steps.version.outputs.version }}"
          node -e "const fs=require('fs'),f='manifest.json',j=JSON.parse(fs.readFileSync(f));j.version='$version';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          npm pkg set version="$version"

      # Tag-push path: the hand-set tag must agree with manifest.json's version,
      # so the released zip can't disagree with the tag people downloaded.
      - name: Verify tag matches manifest version
        if: github.event_name == 'push'
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$manifest_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag ${{ steps.version.outputs.tag }} does not match manifest.json version $manifest_version." >&2
            echo "Bump manifest.json to match the tag, or use Run workflow to set the version for you." >&2
            exit 1
          fi

      # Gate the release on the same checks CI runs on every PR.
      - name: Run offline tests
        run: npm run test:offline
      - name: Run live tests
        run: npm run test:live
      - name: Run UI snapshot test
        run: npm run test:ui

      - name: Build extension zip
        run: npm run build

      # Dispatch path: commit the version bump (if any) and create the tag.
      # Pushed with GITHUB_TOKEN, whose pushes don't trigger workflows, so this
      # never re-triggers the tag-push path above. Releasing at the current
      # version (e.g. the first release) is a no-op commit — just tag it.
      - name: Commit and tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Version already ${{ steps.version.outputs.version }}; tagging the current commit."
          else
            git commit -am "Release ${{ steps.version.outputs.tag }}"
          fi
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/google-calendar-event-creator.zip
          generate_release_notes: true
