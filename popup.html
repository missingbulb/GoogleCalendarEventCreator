<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        width: 280px;
        margin: 0;
        padding: 12px;
        color: #202124;
      }
      #heading {
        font-size: 12px;
        font-weight: 500;
        color: #5f6368;
        margin: 0 0 8px;
      }
      /* One button per distinct event found on the page. Kept compact
         (~60px tall) so several fit without scrolling: title on top, the
         date/time (and location, if any) beneath. */
      .event-btn {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 2px;
        box-sizing: border-box;
        width: 100%;
        min-height: 60px;
        margin-bottom: 8px;
        padding: 8px 12px;
        text-align: start;
        color: #fff;
        background-color: #1a73e8;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      .event-btn:last-child {
        margin-bottom: 0;
      }
      .event-btn:hover {
        background-color: #1765cc;
      }
      .event-btn .e-title {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.3;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      .event-btn .e-when {
        font-size: 11px;
        opacity: 0.9;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .empty {
        font-size: 12px;
        color: #80868b;
      }
    </style>
  </head>
  <body>
    <p id="heading">Reading page&hellip;</p>
    <div id="events"></div>
    <p class="empty" id="empty" hidden>No event details found on this page.</p>
    <script src="background.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
