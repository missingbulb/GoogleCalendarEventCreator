name: Refresh cached HTML files

# Keeps the committed cached HTML files fresh independently of pushes, and
# surfaces site markup changes as a failing scheduled run within a day.
on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      force_all:
        description: "Force-refresh all cached HTML files, even ones less than 24h old"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Scheduled runs only refresh cached HTML files older than 24h. Manually
      # triggered runs can opt into refreshing every file via the
      # "force_all" input.
      - name: Refresh cached HTML files
        run: npm run refresh -- ${{ inputs.force_all && '--force' || '' }}

      # Run the live assertions against the freshly fetched pages, so a site
      # that changed its markup turns this scheduled run red.
      - name: Run live tests
        run: npm run test:live

      - name: Commit refreshed cached HTML files
        run: |
          if [ -n "$(git status --porcelain data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "chore: refresh cached HTML files [skip ci]"
            git push
          else
            echo "Cached HTML files already fresh; nothing to commit."
          fi
