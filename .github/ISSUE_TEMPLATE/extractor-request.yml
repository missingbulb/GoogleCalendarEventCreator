name: Event source request
description: Request that a website be added as a supported event source. A Claude agent implements the extractor automatically and opens a pull request for review.
title: "Event source request - [URL]"
labels: ["extractor-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new event source! Submitting this issue kicks off
        a Claude agent that implements the extractor, caches the event page, adds
        an integration test, and opens a pull request for a maintainer to review.

        Only the URL is required. Any other details you can fill in — the event's
        name, time, location — help the agent verify its extraction; fields left
        blank are fine.
  - type: input
    id: url
    attributes:
      label: URL
      description: The event page to add support for.
    validations:
      required: true
  # Keep this an `input` (text) field. GitHub issue forms only prefill text
  # fields (input/textarea) from a URL query param; a `dropdown`/`checkboxes`
  # silently ignores the param (no error — the control just keeps its default).
  # The extension's popup link prefills this count, so switching to a nicer
  # dropdown/checkbox control would silently break that prefill.
  - type: input
    id: event-count
    attributes:
      label: Number of events on the page
      description: >-
        How many distinct events does this page show? Leave it at 1 for a single
        event page; enter a higher number for a listing, calendar, or a tour with
        multiple dates — the agent then extracts every event it finds rather than
        treating the page as unusable. (The extension fills in the count it
        detected when you open the form from its popup. It's a plain text field
        because GitHub only prefills text fields from the popup's link, not
        dropdowns or checkboxes.)
      value: "1"
  - type: input
    id: name
    attributes:
      label: Name
      description: The event's title.
  - type: input
    id: start
    attributes:
      label: Start time
      description: When the event starts, e.g. 2026-06-25 18:00.
  - type: input
    id: end
    attributes:
      label: End time
      description: When the event ends, if shown.
  - type: input
    id: timezone
    attributes:
      label: Timezone
      description: The event's timezone, e.g. America/New_York.
  - type: input
    id: location
    attributes:
      label: Location
      description: The venue or address.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: The event's description or summary, as shown on the page.
      placeholder: Paste or summarize the event details here.
  # Keep this an `input` (text) field for the same prefill reason as event-count
  # above. The extension derives it from the live page and fills it in; the
  # pipeline machine-reads it (triage's waitSelectorOf) and hands it to ScraperAPI
  # as wait_for_selector when it re-records the page, so a flaky JS single-page-app
  # waits for real content to render instead of snapshotting an empty shell (#603).
  # Safe to leave blank — the pipeline just fetches without the hint then.
  - type: input
    id: wait-selector
    attributes:
      label: Wait-for selector
      description: >-
        A CSS selector the recorder should wait for before capturing the page
        (auto-filled by the extension from the page you're viewing). Only needed
        for JavaScript-heavy sites whose content loads after the initial HTML;
        leave blank otherwise.
