name: Daily lessons digest

# Once a day, a Claude (Opus) agent reviews the last 24h of commits + issue/PR
# activity and proposes terse additions to the Markdown docs (gotchas, practices,
# test mechanics, architecture rules) as a PR for human review — the automated
# counterpart of the on-demand "learned lessons" instruction
# (docs/claude/workflow.md). Full description: docs/claude/auto-lessons.md.
#
# Required repository secret:
#   ANTHROPIC_API_KEY — Claude API key for the agent (keep a spend cap set)
# The GITHUB_TOKEN is standard and always available.

on:
  schedule:
    # 02:00 UTC ≈ 05:00 Israel time during IDT (summer, UTC+3); 04:00 during IST
    # (winter, UTC+2). GitHub cron is UTC-only and does not follow DST — switch to
    # "0 3 * * *" to land at 05:00 in winter instead. Scheduled runs are
    # best-effort and can start late under GitHub load.
    - cron: "0 2 * * *"
  workflow_dispatch: # manual / on-demand run (also handy for testing)

permissions:
  contents: write # push the lessons branch
  pull-requests: write # open the PR
  issues: read # read issue/PR activity in the window
  actions: write # dispatch the Tests workflow on the branch

# Never let two daily runs overlap.
concurrency:
  group: daily-lessons
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          # Use the token so git pushes from inside the agent step are authorised.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # the agent scans `git log --since`

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Cheap activity gate: skip the (Opus) agent entirely on a day with no new
      # commits and no updated issues/PRs in the window — there's nothing to learn
      # from, and an empty run shouldn't spend an Opus call. Also computes the
      # 24h-ago timestamp the prompt is built around.
      - name: Check for activity in the last 24h
        id: activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SINCE="$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)"
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          COMMITS="$(git log --since="$SINCE" --oneline | wc -l | tr -d ' ')"
          ISSUES="$(gh search issues --repo "$REPO" "updated:>=$SINCE" --json number --jq 'length' 2>/dev/null || echo 0)"
          PRS="$(gh search prs --repo "$REPO" "updated:>=$SINCE" --json number --jq 'length' 2>/dev/null || echo 0)"
          echo "Commits: $COMMITS   Updated issues: $ISSUES   Updated PRs: $PRS   (since $SINCE)"
          if [ "$COMMITS" = "0" ] && [ "$ISSUES" = "0" ] && [ "$PRS" = "0" ]; then
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "No activity in the last 24h — skipping the agent."
          else
            echo "active=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install npm dependencies
        if: steps.activity.outputs.active == 'true'
        run: npm ci

      - name: Install Claude Code CLI
        if: steps.activity.outputs.active == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        if: steps.activity.outputs.active == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Interpolate the repo + window into the static prompt template.
      - name: Build agent prompt
        if: steps.activity.outputs.active == 'true'
        env:
          REPO: ${{ github.repository }}
          SINCE: ${{ steps.activity.outputs.since }}
        run: |
          python3 - << 'PYEOF'
          import os
          template = open(".github/agent-prompt-lessons.md").read()
          prompt = (template
              .replace("{{REPO}}",  os.environ["REPO"])
              .replace("{{SINCE}}", os.environ["SINCE"]))
          open("/tmp/agent-prompt.txt", "w").write(prompt)
          print(f"Prompt length: {len(prompt)} chars")
          PYEOF

      - name: Run Claude agent (Opus)
        if: steps.activity.outputs.active == 'true'
        timeout-minutes: 20
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          claude \
            --dangerously-skip-permissions \
            --model claude-opus-4-8 \
            -p "$(cat /tmp/agent-prompt.txt)"
