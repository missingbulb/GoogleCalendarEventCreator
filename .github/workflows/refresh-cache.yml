name: Refresh cached HTML files

# Records any missing or empty (zero-byte) data/<name>.html by fetching its URL
# (from the matching data/<name>.url), then runs the live tests and commits the
# result to the branch it ran on. Run it on demand from the Actions tab, against
# the branch you're working on — not main, since under branch protection a commit
# to main must go through a PR.
#
# To re-record a cached file that already exists (e.g. after a site changes its
# markup): delete data/<name>.html on your branch, commit and push, then run this
# workflow on that branch. The now-missing file is refetched like any other —
# there's no separate "force" mode.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fetches any cached HTML file that is missing or empty (zero bytes).
      - name: Refresh cached HTML files
        run: npm run refresh

      # Run the live assertions against the fetched pages, so a site that
      # changed its markup turns this run red.
      - name: Run live tests
        run: npm run test:live

      - name: Commit refreshed cached HTML files
        run: |
          if [ -n "$(git status --porcelain data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "chore: refresh cached HTML files [skip ci]"
            git push
          else
            echo "All cached HTML files already present; nothing to commit."
          fi
