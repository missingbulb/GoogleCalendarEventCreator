<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        width: 280px;
        margin: 0;
        padding: 12px;
        color: #202124;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 8px;
        overflow-wrap: break-word;
      }
      .field {
        font-size: 12px;
        line-height: 1.4;
        margin-bottom: 6px;
        overflow-wrap: break-word;
      }
      .field .label {
        color: #5f6368;
        font-weight: 500;
      }
      .note {
        font-size: 11px;
        font-style: italic;
        color: #80868b;
        margin-bottom: 6px;
      }
      button {
        display: block;
        width: 100%;
        margin-top: 8px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 500;
        color: #fff;
        background-color: #1a73e8;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        background-color: #1765cc;
      }
      button:disabled {
        background-color: #c2c2c2;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <h1 id="title">Reading page&hellip;</h1>
    <div class="field"><span class="label">When: </span><span id="when">&mdash;</span></div>
    <div class="field" id="location-field" hidden><span class="label">Where: </span><span id="location"></span></div>
    <div class="note" id="multiple-note" hidden>First of several events found on this page.</div>
    <button id="create-btn" disabled>Add to Google Calendar</button>
    <script src="background.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
