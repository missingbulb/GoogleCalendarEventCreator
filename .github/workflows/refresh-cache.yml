name: Refresh cached HTML files

# Fills in any empty (zero-byte) data/<name>.html file by fetching its URL
# (from the matching cases/<name>.json or data/<name>.url). Run on demand —
# there's no schedule. To re-record cached files that already exist (e.g.
# after a site changes its markup), run this workflow with "force_all" checked.
on:
  workflow_dispatch:
    inputs:
      force_all:
        description: "Re-fetch every cached HTML file (not just missing ones)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fetches any cached HTML file that is missing or empty (zero bytes).
      # The "force_all" input re-fetches every file.
      - name: Refresh cached HTML files
        run: npm run refresh -- ${{ inputs.force_all && '--force' || '' }}

      # Run the live assertions against the fetched pages, so a site that
      # changed its markup turns this run red.
      - name: Run live tests
        run: npm run test:live

      - name: Commit refreshed cached HTML files
        run: |
          if [ -n "$(git status --porcelain data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "chore: refresh cached HTML files [skip ci]"
            git push
          else
            echo "All cached HTML files already present; nothing to commit."
          fi
