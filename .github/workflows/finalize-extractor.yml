name: "Auto-Implement Extractor: Finalize"
# Distinct per-run title (see the note in auto-implement-extractor.yml) so the
# finalize phase is discernible from prepare/claudinite in the Actions list.
run-name: "Finalize extractor · #${{ github.event.issue.number }} — ${{ github.event.issue.title }}"

# Triggered when the 'extractor-agent-done' label is added to an issue — the
# signal the Claude Code on the web routine raises after it has written extract()
# + the integration case and pushed them to the scaffolded branch. This is the
# deterministic wrap-up that used to be a step in auto-implement-extractor.yml,
# split out because the agent now runs in its own environment (web), not inside
# Actions. It re-derives the branch from the issue, enforces the agent's two-file
# blast radius against the scaffold commit, runs the quality floor, re-verifies,
# opens the PR, and dispatches test.yml. See dev/create-extractor/auto-extractor.md.
#
# Why a label (not the agent calling the script directly): Phase 2 is the EXTERNAL
# enforcement of the agent's containment — the blast-radius guard reverts whatever
# the agent committed outside its two files. Running it here, in a runner the agent
# doesn't control, keeps that a guarantee rather than a request (see
# dev/procedures/highLevelDesign.md). The label fires this workflow because the agent
# adds it with the Claude GitHub App's token, not the Actions GITHUB_TOKEN whose
# events are suppressed (dev/procedures/github.md).
on:
  issues:
    types: [labeled]

# GitHub's implicit run shell is bash -e without pipefail, so a failing piped
# command still shows the step green. Force pipefail for every run: step.
defaults:
  run:
    shell: bash

permissions:
  contents: write       # push the blast-radius revert commit
  pull-requests: write  # open the PR
  issues: write         # comment + clear the label
  actions: write        # dispatch test.yml on the branch

jobs:
  finalize:
    if: github.event.label.name == 'extractor-agent-done'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Re-derive the deterministic mode-aware names from the issue's event URL —
      # the same names Phase 1 used — so this workflow knows which branch and files
      # to finalize without the agent passing them back. Runs on the default-branch
      # checkout (an `issues` event), so resolve-source sees `main`: a new-mode
      # source isn't there yet, a supported host's source is — which is exactly how
      # planNames tells the two modes apart.
      - name: Derive names from the issue
        id: names
        env:
          ISSUE_BODY:   ${{ github.event.issue.body }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        # Tee into a shared log the failure step reads, so a genuine break reports WHY
        # on the issue (a later step can't see an earlier one's output otherwise).
        # pipefail is on by the default shell, so the pipe doesn't mask a non-zero exit.
        run: node dev/create-extractor/derive-names.js 2>&1 | tee -a "$RUNNER_TEMP/finalize.log"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Phase 2 — deterministic wrap-up (not the agent): check out the agent's
      # branch, enforce the two-file blast radius against the scaffold commit, run
      # the quality floor, re-verify, commit any revert, open the PR, dispatch CI,
      # and clear the trigger label. npm ci runs inside the script before the
      # re-verify (the quality floor + git work above it need no deps).
      - name: Finalize — verify, commit, open PR
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          MODE:         ${{ steps.names.outputs.mode }}
          BRANCH:       ${{ steps.names.outputs.branch }}
          SLUG:         ${{ steps.names.outputs.slug }}
          SOURCE_BASE:  ${{ steps.names.outputs.sourceBase }}
          SOURCE_PATH:  ${{ steps.names.outputs.sourcePath }}
          CASE_NAME:    ${{ steps.names.outputs.caseName }}
          HOST:         ${{ steps.names.outputs.host }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO:         ${{ github.repository }}
        run: bash dev/create-extractor/phase2-finalize.sh 2>&1 | tee -a "$RUNNER_TEMP/finalize.log"

      # A genuine break only (an expected non-PR verdict — empty / degenerate — is
      # handled green inside the script). Reaching here means npm ci, the
      # re-verify, or the git/PR work actually failed.
      - name: Comment on failure
        if: failure()
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Put the REASON it failed on the issue, not just a run link — the tail of the
          # captured step output. Redact the token first: the Actions log masks it, but
          # this captured file is raw and gets posted to a (public) issue.
          REASON=""
          LOG="$RUNNER_TEMP/finalize.log"
          if [ -s "$LOG" ]; then
            REASON="$(tail -n 40 "$LOG")"
            [ -n "${GH_TOKEN:-}" ] && REASON="${REASON//${GH_TOKEN}/***}"
          fi
          {
            echo "⚠️ The finalize-extractor workflow failed unexpectedly. [View run]($RUN_URL). The agent's work is on its branch; manual finalization may be needed — see dev/create-extractor/adding-a-source.md."
            if [ -n "$REASON" ]; then
              printf '\n<details><summary>Why it failed (last lines of the run log)</summary>\n\n```\n%s\n```\n\n</details>\n' "$REASON"
            fi
          } > "$RUNNER_TEMP/fail-comment.md"
          gh issue comment "$ISSUE_NUMBER" --body-file "$RUNNER_TEMP/fail-comment.md"
